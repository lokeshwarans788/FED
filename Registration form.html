<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h2>Sports Team Registration Form</h2>

    <form>

        <label>Player Name:</label><br>
        <input type="text" name="playerName" placeholder="Enter player name"><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other<br><br>

        <label>Age:</label><br>
        <input type="number" name="age" placeholder="Enter your age"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" placeholder="Enter phone number"><br><br>

        <label>College Name:</label><br>
        <input type="text" name="college" placeholder="Enter your college name"><br><br>

        <label>Select Sport:</label><br>
        <select name="sport">
            <option>Select sport</option>
            <option>Cricket</option>
            <option>Volleyball</option>
            <option>Football</option>
            <option>Athletics</option>
            <option>Kabaddi</option>
        </select><br><br>

        <label>Team Name:</label><br>
        <input type="text" name="teamName" placeholder="Enter team name"><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
