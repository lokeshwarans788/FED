<!DOCTYPE html>
<html>

<head>
    <title>Takshashila University</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        h1{
            text-align:center;
            margin:10px;
        }

        .navbar {
            background-color: black;
            display: flex;
            align-items: center;
            padding: 5px 10px;
        }

        .navbar img {
            height: 50px;
            margin-right: 20px;
        }

        .navbar a {
            color: white;
            padding: 14px 15px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: darkorange;
        }

        .search-box {
            margin-left: auto;
        }

        .search-box input {
            padding: 5px;
        }

        .search-box button {
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Welcome to Takshashila University</h1>


<div class="navbar">

    <!-- Logo -->
       <img src="https://takshashilauniv.ac.in/wp-content/uploads/elementor/thumbs/logo-new-r7koupmjvuvqwqw5czet7ld7rf5he8i562uzkynjwk.png" width="100px" height="50px">

    <!-- Links -->
    <a href="https://takshashilauniv.ac.in/">Home</a>
    <a href="https://takshashilauniv.ac.in/about-us/">About</a>
    <a href="https://takshashilauniv.ac.in/admission/">Admission</a>
    <a href="https://takshashilauniv.ac.in/academics/">Academics</a>
    <a href="https://takshashilauniv.ac.in/contact-us/">contact-us</a>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Search...">
        <button>Search</button>
    </div>

</div>

</body>
</html>
